<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ADB5;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#00d4e0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00ADB5;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#444444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main machine base -->
  <rect x="50" y="400" width="700" height="120" fill="url(#machineGradient)" rx="10" filter="url(#shadow)"/>
  
  <!-- Machine body -->
  <rect x="80" y="200" width="640" height="200" fill="url(#machineGradient)" rx="15" filter="url(#shadow)"/>
  
  <!-- Injection unit -->
  <rect x="100" y="150" width="200" height="80" fill="url(#machineGradient)" rx="8" filter="url(#shadow)"/>
  <rect x="110" y="160" width="180" height="60" fill="url(#panelGradient)" rx="5"/>
  
  <!-- Barrel and screw -->
  <rect x="320" y="180" width="300" height="40" fill="url(#accentGradient)" rx="20" filter="url(#glow)"/>
  <circle cx="320" cy="200" r="25" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="620" cy="200" r="25" fill="url(#accentGradient)" filter="url(#glow)"/>
  
  <!-- Clamping unit -->
  <rect x="650" y="220" width="100" height="160" fill="url(#machineGradient)" rx="10" filter="url(#shadow)"/>
  <rect x="660" y="230" width="80" height="140" fill="url(#panelGradient)" rx="5"/>
  
  <!-- Mold -->
  <rect x="620" y="240" width="30" height="120" fill="url(#accentGradient)" rx="5" filter="url(#glow)"/>
  
  <!-- Control panel -->
  <rect x="150" y="100" width="200" height="40" fill="url(#panelGradient)" rx="5" filter="url(#shadow)"/>
  <rect x="160" y="110" width="180" height="20" fill="url(#accentGradient)" rx="3" filter="url(#glow)"/>
  
  <!-- Screens and displays -->
  <rect x="400" y="120" width="120" height="60" fill="url(#panelGradient)" rx="8" filter="url(#shadow)"/>
  <rect x="410" y="130" width="100" height="40" fill="#000000" rx="5"/>
  <rect x="420" y="140" width="80" height="20" fill="url(#accentGradient)" rx="2" filter="url(#glow)"/>
  
  <!-- Pressure gauges -->
  <circle cx="200" y="300" r="25" fill="url(#panelGradient)" filter="url(#shadow)"/>
  <circle cx="200" y="300" r="20" fill="#000000"/>
  <circle cx="200" y="300" r="15" fill="url(#accentGradient)" filter="url(#glow)"/>
  <line x1="200" y1="300" x2="200" y2="285" stroke="#ffffff" stroke-width="2"/>
  
  <circle cx="300" y="300" r="25" fill="url(#panelGradient)" filter="url(#shadow)"/>
  <circle cx="300" y="300" r="20" fill="#000000"/>
  <circle cx="300" y="300" r="15" fill="url(#accentGradient)" filter="url(#glow)"/>
  <line x1="300" y1="300" x2="300" y2="285" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Temperature indicators -->
  <rect x="450" y="280" width="60" height="20" fill="url(#accentGradient)" rx="10" filter="url(#glow)"/>
  <rect x="520" y="280" width="60" height="20" fill="url(#accentGradient)" rx="10" filter="url(#glow)"/>
  
  <!-- Hydraulic system -->
  <rect x="100" y="350" width="500" height="30" fill="url(#panelGradient)" rx="5" filter="url(#shadow)"/>
  <rect x="110" y="360" width="480" height="10" fill="url(#accentGradient)" rx="5" filter="url(#glow)"/>
  
  <!-- Safety guards -->
  <rect x="70" y="180" width="20" height="200" fill="url(#accentGradient)" rx="3" filter="url(#glow)"/>
  <rect x="710" y="180" width="20" height="200" fill="url(#accentGradient)" rx="3" filter="url(#glow)"/>
  
  <!-- Emergency stop -->
  <circle cx="650" y="120" r="15" fill="#ff4444" filter="url(#shadow)"/>
  <text x="650" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">E</text>
  
  <!-- Status lights -->
  <circle cx="580" y="120" r="8" fill="#00ff00" filter="url(#glow)"/>
  <circle cx="600" y="120" r="8" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="620" y="120" r="8" fill="#ff8800" filter="url(#glow)"/>
  
  <!-- Data cables -->
  <path d="M 200 160 Q 250 140 300 160" stroke="url(#accentGradient)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M 400 160 Q 450 140 500 160" stroke="url(#accentGradient)" stroke-width="3" fill="none" filter="url(#glow)"/>
  
  <!-- Steam/heat indicators -->
  <path d="M 350 200 Q 360 190 370 200 Q 380 210 390 200" stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 400 200 Q 410 190 420 200 Q 430 210 440 200" stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Brand/Model text -->
  <text x="400" y="450" text-anchor="middle" fill="url(#accentGradient)" font-family="Arial" font-size="24" font-weight="bold" filter="url(#glow)">THERMOPLAST 3000</text>
  <text x="400" y="470" text-anchor="middle" fill="#666666" font-family="Arial" font-size="12">INDUSTRIAL INJECTION MOLDING</text>
</svg>

