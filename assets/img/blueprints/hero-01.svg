<svg viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #05070a; }
      .grid-fine { stroke: #1d2f3f; stroke-width: 0.25; }
      .grid-major { stroke: #1d2f3f; stroke-width: 0.5; }
      /* толстая основная линия контура (аналог s ~ 0.7 мм) */
      .contour { fill: none; stroke: #6fa8ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      /* тонкая штриховая (скрытые и охлаждение) */
      .hidden { fill: none; stroke: #6fa8ff; stroke-width: 1; stroke-dasharray: 6 3; }
      /* размерные линии (тонкие сплошные) */
      .dim { fill: none; stroke: #6fa8ff; stroke-width: 1; stroke-linecap: round; }
      .dim-arrow { fill: #6fa8ff; }
      .dim-text { fill: #6fa8ff; font-family: "SF Mono", monospace; font-size: 10px; }
      .label { fill: #6fa8ff; font-family: "SF Mono", monospace; font-size: 10px; }
      /* осевые линии (штрихпунктирные тонкие) */
      .axis { stroke: #6fa8ff; stroke-width: 0.6; stroke-dasharray: 6 3; }
      .centerline { stroke: #6fa8ff; stroke-width: 0.8; stroke-dasharray: 4 3; }
      .cross { stroke: #6fa8ff; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="420" height="260" />

  <g opacity="0.45">
    <g class="grid-fine">
      <line x1="20" y1="20" x2="20" y2="240" />
      <line x1="40" y1="20" x2="40" y2="240" />
      <line x1="60" y1="20" x2="60" y2="240" />
      <line x1="80" y1="20" x2="80" y2="240" />
      <line x1="100" y1="20" x2="100" y2="240" />
      <line x1="120" y1="20" x2="120" y2="240" />
      <line x1="140" y1="20" x2="140" y2="240" />
      <line x1="160" y1="20" x2="160" y2="240" />
      <line x1="180" y1="20" x2="180" y2="240" />
      <line x1="200" y1="20" x2="200" y2="240" />
      <line x1="220" y1="20" x2="220" y2="240" />
      <line x1="240" y1="20" x2="240" y2="240" />
      <line x1="260" y1="20" x2="260" y2="240" />
      <line x1="280" y1="20" x2="280" y2="240" />
      <line x1="300" y1="20" x2="300" y2="240" />
      <line x1="320" y1="20" x2="320" y2="240" />
      <line x1="340" y1="20" x2="340" y2="240" />
      <line x1="360" y1="20" x2="360" y2="240" />
      <line x1="380" y1="20" x2="380" y2="240" />
      <line x1="400" y1="20" x2="400" y2="240" />
      <!-- 3>@87>=B0;L=K5 -->
      <line x1="20" y1="40" x2="400" y2="40" />
      <line x1="20" y1="60" x2="400" y2="60" />
      <line x1="20" y1="80" x2="400" y2="80" />
      <line x1="20" y1="100" x2="400" y2="100" />
      <line x1="20" y1="120" x2="400" y2="120" />
      <line x1="20" y1="140" x2="400" y2="140" />
      <line x1="20" y1="160" x2="400" y2="160" />
      <line x1="20" y1="180" x2="400" y2="180" />
      <line x1="20" y1="200" x2="400" y2="200" />
      <line x1="20" y1="220" x2="400" y2="220" />
    </g>
    <g class="grid-major">
      <line x1="60" y1="20" x2="60" y2="240" />
      <line x1="140" y1="20" x2="140" y2="240" />
      <line x1="220" y1="20" x2="220" y2="240" />
      <line x1="300" y1="20" x2="300" y2="240" />
      <line x1="380" y1="20" x2="380" y2="240" />

      <line x1="20" y1="60" x2="400" y2="60" />
      <line x1="20" y1="120" x2="400" y2="120" />
      <line x1="20" y1="180" x2="400" y2="180" />
      <line x1="20" y1="220" x2="400" y2="220" />
    </g>
  </g>

  <line class="axis" x1="80" y1="40" x2="80" y2="220" />
  <line class="axis" x1="80" y1="160" x2="320" y2="160" />

  <!-- Пресс-форма: вид в разрезе -->
  <g transform="translate(0,0)">
    <!-- полуматрицы -->
    <path
      class="contour"
      d="
        M90 70
        H310
        V150
        H260
        V140
        H220
        V150
        H180
        V140
        H140
        V150
        H90
        Z"
    />

    <!-- полость изделия -->
    <path
      class="contour"
      d="
        M150 95
        H250
        Q265 95 270 110
        V130
        Q265 145 250 145
        H150
        Q135 145 130 130
        V110
        Q135 95 150 95
        Z"
    />

    <!-- разделительная плоскость формы -->
    <line class="centerline" x1="90" y1="120" x2="310" y2="120" />

    <!-- литниковый канал -->
    <line class="contour" x1="200" y1="70" x2="200" y2="95" />
    <circle class="hidden" cx="200" cy="86" r="4" />

    <!-- выталкиватели -->
    <line class="hidden" x1="160" y1="145" x2="160" y2="162" />
    <line class="hidden" x1="190" y1="145" x2="190" y2="162" />
    <line class="hidden" x1="220" y1="145" x2="220" y2="162" />
    <line class="hidden" x1="250" y1="145" x2="250" y2="162" />
  </g>

  <!-- Вид сверху: контур гнезда формы -->
  <g transform="translate(0,40)">
    <ellipse class="contour" cx="190" cy="190" rx="80" ry="14" />
    <ellipse class="contour" cx="190" cy="190" rx="60" ry="10" />
    <ellipse class="contour" cx="190" cy="190" rx="26" ry="5" />

    <!-- штифты центрирования -->
    <circle class="hidden" cx="130" cy="190" r="4" />
    <circle class="hidden" cx="250" cy="190" r="4" />
  </g>

  <!-- Размеры по корпусу формы -->
  <g>
    <line class="dim" x1="90" y1="58" x2="310" y2="58" />
    <polygon class="dim-arrow" points="90,58 98,54 98,62" />
    <polygon class="dim-arrow" points="310,58 302,54 302,62" />
    <line class="dim" x1="90" y1="62" x2="90" y2="50" />
    <line class="dim" x1="310" y1="62" x2="310" y2="50" />
    <text class="dim-text" x="200" y="46" text-anchor="middle">220</text>
  </g>

  <g>
    <line class="dim" x1="330" y1="70" x2="330" y2="150" />
    <polygon class="dim-arrow" points="330,70 326,78 334,78" />
    <polygon class="dim-arrow" points="330,150 326,142 334,142" />
    <line class="dim" x1="324" y1="70" x2="336" y2="70" />
    <line class="dim" x1="324" y1="150" x2="336" y2="150" />
    <text class="dim-text" x="336" y="114" text-anchor="start">80</text>
  </g>

  <!-- Размеры полости изделия -->
  <g>
    <line class="dim" x1="150" y1="92" x2="250" y2="92" />
    <polygon class="dim-arrow" points="150,92 158,88 158,96" />
    <polygon class="dim-arrow" points="250,92 242,88 242,96" />
    <line class="dim" x1="150" y1="96" x2="150" y2="84" />
    <line class="dim" x1="250" y1="96" x2="250" y2="84" />
    <text class="dim-text" x="200" y="80" text-anchor="middle">100</text>
  </g>

  <g>
    <line class="dim" x1="280" y1="95" x2="280" y2="145" />
    <polygon class="dim-arrow" points="280,95 276,103 284,103" />
    <polygon class="dim-arrow" points="280,145 276,137 284,137" />
    <line class="dim" x1="274" y1="95" x2="286" y2="95" />
    <line class="dim" x1="274" y1="145" x2="286" y2="145" />
    <text class="dim-text" x="286" y="123" text-anchor="start">50</text>
  </g>

  <!-- Технологический таргет -->
  <g opacity="0.9">
    <line class="cross" x1="40" y1="210" x2="60" y2="210" />
    <line class="cross" x1="50" y1="200" x2="50" y2="220" />
  </g>

  <!-- Дополнительные конструктивные элементы для усложнения чертежа -->
  <!-- Каналы охлаждения -->
  <g opacity="0.85">
    <path
      class="hidden"
      d="
        M100 105
        H120
        Q130 105 130 115
        V125
        Q130 135 140 135
        H260
        Q270 135 270 125
        V115
        Q270 105 280 105
        H300"
    />
    <path
      class="hidden"
      d="
        M100 135
        H130
        Q140 135 145 140
        L160 150
        H240
        L255 140
        Q260 135 270 135
        H300"
    />
  </g>

  <!-- Условные выемки под направляющие колонки -->
  <g>
    <rect class="contour" x="100" y="70" width="10" height="14" />
    <rect class="contour" x="290" y="70" width="10" height="14" />
    <rect class="contour" x="100" y="136" width="10" height="14" />
    <rect class="contour" x="290" y="136" width="10" height="14" />
  </g>

  <!-- Дополнительные осевые линии для усиления техничности -->
  <g opacity="0.7">
    <line class="centerline" x1="145" y1="70" x2="145" y2="190" />
    <line class="centerline" x1="255" y1="70" x2="255" y2="190" />
  </g>

  <!-- Дополнительные сложные элементы: радиусные выборки и фаски -->
  <g>
    <!-- радиусные выборки в полуматрицах -->
    <path
      class="contour"
      d="
        M140 95
        Q145 90 150 90
        H250
        Q255 90 260 95"
    />
    <path
      class="contour"
      d="
        M140 145
        Q145 150 150 150
        H250
        Q255 150 260 145"
    />

    <!-- фаски на кромках формы -->
    <path
      class="contour"
      d="
        M90 70
        L96 64
        H304
        L310 70"
    />
    <path
      class="contour"
      d="
        M90 150
        L96 156
        H304
        L310 150"
    />
  </g>
</svg>

