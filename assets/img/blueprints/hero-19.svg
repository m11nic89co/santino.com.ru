      .grid-major { stroke: #1d2f3f; stroke-width: 0.5; }
      .contour { fill: none; stroke: #6fa8ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .hidden { fill: none; stroke: #6fa8ff; stroke-width: 1; stroke-dasharray: 6 3; }
      .section { fill: rgba(111, 168, 255, 0.16); stroke: #6fa8ff; stroke-width: 1.2; }
      .dim { fill: none; stroke: #6fa8ff; stroke-width: 1; stroke-linecap: round; }
      .dim-arrow { fill: #6fa8ff; }
      .dim-text { fill: #6fa8ff; font-family: "SF Mono", monospace; font-size: 9px; }
      .axis { stroke: #6fa8ff; stroke-width: 0.6; stroke-dasharray: 6 3; }
      .centerline { stroke: #6fa8ff; stroke-width: 0.8; stroke-dasharray: 4 3; }
